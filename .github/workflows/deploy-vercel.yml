name: Deploy to Vercel

# Push to `main` → production deploy via the Vercel CLI.
# This bypasses the Vercel GitHub App webhook entirely, which has
# historically been unreliable for this project (Vercel link metadata
# still references the old `crmn111` owner from before the repo moved —
# webhooks drop pushes silently as a result).
#
# IMPORTANT: this workflow uploads the source and lets Vercel's platform
# build it remotely. Do NOT switch to the `vercel pull` + `vercel build` +
# `vercel deploy --prebuilt` flow — on chm-website that path produced a
# broken bundle where every page hit a 504 GATEWAY_TIMEOUT because the
# locally-pulled env vars didn't match the set Vercel uses for its
# platform build. Letting Vercel build remotely reproduces the same
# result as a webhook-triggered deploy.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_KyQSgvuB90aXBkYXVJY88NH4
  VERCEL_PROJECT_ID: prj_HkqdEYF4QRl3KYHuR2s9Gqn8uJO8

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production (Vercel builds remotely)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
